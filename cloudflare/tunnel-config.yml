# Cloudflare Tunnel config cho Directus CMS
# Đặt tại: ~/.cloudflared/config.yml (nếu chạy systemd)
# hoặc mount vào container cloudflared

tunnel: <TUNNEL_ID>           # lấy từ: cloudflared tunnel list
credentials-file: /etc/cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: cms.tecotec.top
    service: http://localhost:8055
  - service: http_status:404
