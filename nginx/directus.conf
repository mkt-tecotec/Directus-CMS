server {
    listen 80;
    server_name cms.tecotec.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cms.tecotec.top;

    # SSL - được Certbot tự động thêm
    # ssl_certificate /etc/letsencrypt/live/cms.tecotec.top/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cms.tecotec.top/privkey.pem;

    # Upload size (files, ảnh)
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8055;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}
