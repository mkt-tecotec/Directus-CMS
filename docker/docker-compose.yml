services:
  database:
    image: postgres:15-alpine
    container_name: directus-db
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - ../data/database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - directus-net

  cache:
    image: redis:7-alpine
    container_name: directus-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - directus-net

  directus:
    image: directus/directus:latest
    container_name: directus
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_started
    env_file: ../.env
    volumes:
      - ../data/uploads:/directus/uploads
      - ../data/extensions:/directus/extensions
    ports:
      - "127.0.0.1:8055:8055"
    networks:
      - directus-net

  # OPTION B: Dung neu chay cloudflared trong Docker thay vi systemd
  # Xem huong dan: cloudflare/README.md
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: directus-cloudflared
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - directus
  #   networks:
  #     - directus-net

networks:
  directus-net:
    driver: bridge
